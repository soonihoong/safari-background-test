<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#172342" />
    <title>Mobile Safari Fullscreen Background Test</title>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: visible;
      }

      html {
        background-image: url("images/background.png");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }

      body {
        background: transparent;
      }
    </style>
  </head>

  <body></body>
</html>
