<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#172342" />
    <title>Mobile Safari Fullscreen Background Test</title>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100lvh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #172342;
      }

      .background {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        width: 100vw;
        height: 100lvh;
        object-fit: fill;
        pointer-events: none;
        user-select: none;
      }

      .content {
        position: relative;
        width: 100%;
        height: 100dvh;
        padding:
          env(safe-area-inset-top, 0px)
          env(safe-area-inset-right, 0px)
          env(safe-area-inset-bottom, 0px)
          env(safe-area-inset-left, 0px);
      }
    </style>
  </head>

  <body>
    <img class="background" src="images/background.png" alt="" />
    <main class="content"></main>
  </body>
</html>
